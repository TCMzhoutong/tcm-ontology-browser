<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中医本体词表浏览器</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --panel: #fffefa;
      --panel-soft: #fbfaf5;
      --line: #ddd8cf;
      --text: #222;
      --muted: #666;
      --accent: #2f6f73;
      --accent-soft: #e6f0ee;
      --warn: #9a5b00;
      --warn-soft: #fff4d7;
      --bad: #9b2f2f;
      --bad-soft: #fde8e8;
      --code: #26333d;
      --shadow: 0 1px 2px rgba(42, 36, 24, .04);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      min-height: 640px;
    }
    header {
      position: relative;
      z-index: 100;
      display: grid;
      grid-template-columns: minmax(260px, 520px) 1fr minmax(240px, 420px);
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 244, .96);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
    }
    input:focus, .vocab-button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47, 111, 115, .12);
    }
    .vocab-picker {
      position: relative;
      z-index: 101;
      min-width: 0;
    }
    .vocab-button {
      width: 100%;
      height: 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .vocab-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .vocab-caret {
      color: var(--muted);
      font-size: 12px;
    }
    .vocab-menu {
      position: fixed;
      top: calc(100% + 6px);
      left: 0;
      z-index: 10000;
      width: min(520px, calc(100vw - 32px));
      max-height: min(68vh, 560px);
      overflow-y: auto;
      overscroll-behavior: contain;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefa;
      box-shadow: 0 14px 34px rgba(42, 36, 24, .14);
    }
    .vocab-menu.open { display: block; }
    .vocab-option {
      min-height: 32px;
      height: auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 7px 8px;
      text-align: left;
      color: var(--text);
      white-space: normal;
      line-height: 1.35;
    }
    .vocab-option-name {
      min-width: 0;
    }
    .vocab-option-category {
      align-self: center;
      border: 1px solid #d6d1c6;
      border-radius: 999px;
      padding: 1px 6px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .vocab-option:hover { background: #f0eee7; color: var(--accent); }
    .vocab-option.active {
      background: var(--accent-soft);
      color: #0f4d47;
      font-weight: 600;
    }
    .stats {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      color: var(--muted);
      white-space: nowrap;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff;
      font-size: 12px;
    }
    .main {
      display: grid;
      grid-template-columns: minmax(300px, 25vw) minmax(460px, 1fr) minmax(300px, 25vw);
      min-height: 0;
    }
    .tree-pane, .detail-pane, .related-pane {
      min-height: 0;
      overflow: auto;
    }
    .tree-pane {
      border-right: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .tree-toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf5;
      backdrop-filter: blur(6px);
      color: var(--muted);
      font-size: 12px;
      box-shadow: 0 1px 0 rgba(42, 36, 24, .03);
    }
    .side-tabs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }
    .side-tab {
      height: 28px;
      padding: 0 10px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      border-radius: 4px;
    }
    .side-tab.active {
      border-color: #cddfdc;
      background: var(--accent-soft);
      color: #0f4d47;
    }
    .tree-status {
      margin-left: 6px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      align-self: center;
      font-weight: 500;
    }
    .tree-actions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }
    .tree-actions[hidden] { display: none; }
    button {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 0 9px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .tree {
      padding: 8px 4px 24px;
    }
    .side-view { display: none; }
    .side-view.active { display: block; }
    .node-row {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      min-height: 30px;
      border-radius: 4px;
      margin: 0 4px;
      padding-right: 8px;
      cursor: pointer;
    }
    .node-row:hover { background: #f0eee7; }
    .node-row.selected {
      background: var(--accent-soft);
      color: #0f4d47;
      font-weight: 600;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .twisty {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      align-self: center;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
    }
    .twisty:hover {
      background: rgba(24, 95, 88, .10);
      color: var(--accent);
    }
    .twisty.empty {
      height: 0;
      min-height: 0;
      overflow: hidden;
      cursor: default;
      pointer-events: none;
    }
    .twisty.empty:hover {
      background: transparent;
      color: var(--muted);
    }
    .node-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-meta {
      color: var(--muted);
      font-size: 12px;
      margin-left: 8px;
    }
    .children { display: none; }
    .children.open { display: block; }
    .detail-pane {
      background: var(--panel);
      padding: 18px 22px 40px;
    }
    .related-pane {
      border-left: 1px solid var(--line);
      background: #f8f6ef;
      padding: 14px 12px 32px;
    }
    .related-list {
      display: grid;
      gap: 8px;
    }
    .related-section-title {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .entity-card {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .entity-card h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }
    .entity-row {
      display: grid;
      gap: 3px;
    }
    .entity-key {
      color: var(--muted);
      font-size: 12px;
    }
    .entity-value {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .entity-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .entity-tag {
      max-width: 100%;
      border: 1px solid #d6d1c6;
      border-radius: 999px;
      padding: 2px 7px;
      background: #fbfaf5;
      color: #34302a;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
    }
    .related-item {
      width: 100%;
      height: auto;
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefa;
      text-align: left;
      color: var(--text);
    }
    .related-item:hover {
      border-color: var(--accent);
      color: var(--text);
      background: #fff;
    }
    .related-item.current {
      border-color: rgba(47, 111, 115, .34);
      background: #edf5f2;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .related-item.current:hover {
      background: #e8f2ef;
    }
    .related-heading {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .related-vocab {
      min-width: 0;
      flex: 1;
      color: #244f51;
      font-size: 13px;
      font-weight: 650;
      line-height: 1.35;
      word-break: break-word;
    }
    .related-category {
      flex: 0 0 auto;
      max-width: 42%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid #d6d1c6;
      border-radius: 999px;
      padding: 1px 6px;
      background: #fbfaf5;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .related-match, .related-definition {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }
    .related-path {
      width: fit-content;
      max-width: 100%;
      border: 1px solid #e2ddd3;
      border-radius: 6px;
      padding: 3px 6px;
      background: #f6f3ec;
      color: #746d61;
      font-size: 11.5px;
      line-height: 1.45;
      word-break: break-word;
    }
    .related-path .path-display {
      gap: 3px;
    }
    .related-path .path-segment {
      color: #746d61;
    }
    .related-path .path-separator {
      color: #8a7a59;
      opacity: .82;
    }
    .related-item.current .related-path {
      border-color: rgba(47, 111, 115, .18);
      background: rgba(255, 255, 255, .62);
      color: #5f706d;
    }
    .related-definition {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 24px;
      line-height: 1.25;
      margin: 0 0 6px;
      letter-spacing: 0;
    }
    .sub {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .badge {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      border: 1px solid var(--line);
      white-space: nowrap;
    }
    .badge.ok { background: var(--accent-soft); border-color: #b7d9d4; color: #126158; }
    .badge.warn { background: var(--warn-soft); border-color: #edcf87; color: var(--warn); }
    .badge.bad { background: var(--bad-soft); border-color: #efb0b0; color: var(--bad); }
    .grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .key, .value {
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
    }
    .key {
      background: #f7f5ef;
      color: var(--muted);
      font-size: 12px;
    }
    .value {
      min-width: 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .path-display {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      white-space: normal;
    }
    .path-segment {
      color: #34302a;
    }
    .path-separator {
      color: var(--accent);
      font-weight: 650;
      opacity: .72;
      padding: 0 1px;
    }
    .value .path-display {
      row-gap: 5px;
    }
    .value .path-segment {
      border: 1px solid #e2ddd3;
      border-radius: 999px;
      padding: 2px 7px;
      background: #fbfaf5;
      line-height: 1.45;
    }
    .table-wrap {
      max-width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-top: 6px;
    }
    .value table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      font-size: 13px;
      line-height: 1.55;
      white-space: normal;
    }
    .value td, .value th {
      border: 1px solid #ded8cc;
      padding: 7px 9px;
      vertical-align: top;
    }
    .value tr:first-child td, .value th {
      background: #f3efe6;
      color: #514a3f;
      font-weight: 650;
    }
    .grid .key:last-of-type, .grid .value:last-child { border-bottom: 0; }
    .evidence-images {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }
    .evidence-images h2 {
      margin: 0;
      font-size: 16px;
    }
    .evidence-images figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      overflow-x: auto;
    }
    .evidence-images img {
      display: block;
      max-width: 100%;
      height: auto;
      background: var(--panel);
    }
    .evidence-images figcaption {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 360px;
      text-align: center;
    }
    .search-results {
      padding: 8px;
    }
    .search-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 4px 9px;
      color: var(--muted);
      font-size: 12px;
    }
    .search-results-list {
      display: grid;
      gap: 2px;
    }
    .result-item {
      width: 100%;
      height: auto;
      padding: 8px 7px;
      border: 0;
      border-bottom: 1px solid #ebe6dc;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: grid;
      gap: 5px;
      text-align: left;
    }
    .result-item:hover {
      color: var(--text);
      background: #f3f1ea;
    }
    .result-item.active {
      background: #edf5f2;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .result-label {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
      color: #244f51;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }
    .result-vocab-tag {
      display: inline-block;
      max-width: 100%;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
    }
    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .result-pill {
      border: 1px solid #d8d2c6;
      border-radius: 4px;
      padding: 0 5px;
      background: #f7f5ef;
      color: #6d6457;
    }
    .result-context {
      color: #6f685d;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }
    .result-context .result-pill {
      display: inline-block;
      margin-right: 5px;
      color: #6f685d;
      vertical-align: baseline;
    }
    .search-group {
      display: block;
    }
    .search-group + .search-group {
      margin-top: 10px;
    }
    .search-group summary {
      position: sticky;
      top: 45px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
      margin: 10px 0 5px;
      padding: 7px 8px;
      border-top: 1px solid #e4ded3;
      border-bottom: 1px solid #d7d0c3;
      background: #ede9df;
      backdrop-filter: blur(4px);
      color: #2f4f50;
      cursor: pointer;
      user-select: none;
      font-size: 13.5px;
      font-weight: 750;
      list-style: none;
    }
    .search-group summary::-webkit-details-marker { display: none; }
    .search-group summary::marker { content: ""; }
    .search-group summary::before {
      content: "▸";
      color: var(--accent);
      width: 16px;
      flex: 0 0 16px;
      font-size: 16px;
      line-height: 1;
    }
    .search-group[open] summary::before {
      content: "▾";
    }
    .search-group-count {
      margin-left: auto;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
    }
    .search-group-body {
      display: grid;
      gap: 7px;
      padding: 0;
    }
    mark.hit {
      padding: 0 1px;
      border-radius: 3px;
      background: #ffe0dc;
      color: #b21f1f;
      font-weight: 700;
    }
    @media (max-width: 860px) {
      .app { height: auto; min-height: 100vh; }
      header { grid-template-columns: 1fr; height: auto; }
      .vocab-menu {
        width: calc(100vw - 24px);
        max-height: 70vh;
        overflow: auto;
      }
      .main { grid-template-columns: 1fr; }
      .tree-pane { height: 45vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .related-pane { border-left: 0; border-top: 1px solid var(--line); }
      .grid { grid-template-columns: 1fr; }
      .key { border-bottom: 0; padding-bottom: 3px; }
      .value { padding-top: 3px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="vocab-picker" id="vocabPicker">
        <button id="vocabButton" class="vocab-button" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="vocab-label" id="vocabLabel">选择词表</span>
          <span class="vocab-caret">▾</span>
        </button>
      </div>
      <div class="stats" id="stats"></div>
      <input id="searchInput" placeholder="全库检索标准实体、异名、英文名、定义" />
    </header>
    <main class="main">
      <section class="tree-pane">
        <div class="tree-toolbar">
          <span class="side-tabs">
            <button id="treeTab" class="side-tab active" type="button">目录</button>
            <button id="searchTab" class="side-tab" type="button">检索</button>
            <span id="treeStatus" class="tree-status">加载中</span>
          </span>
          <span id="treeActions" class="tree-actions">
            <button id="locateCurrentBtn" title="在目录中展开并定位当前概念">定位</button>
            <button id="collapseLevelBtn" title="保留根节点展开，只收起更深层级">收起</button>
            <button id="collapseCurrentBtn" title="按当前展开深度收起最深一层">收起一级</button>
          </span>
          <span id="searchActions" class="tree-actions" hidden>
            <button id="locateFromSearchBtn" title="回到检索框位置">定位</button>
            <button id="expandSearchGroupsBtn" title="展开全部检索分组">展开</button>
            <button id="collapseSearchGroupsBtn" title="收起全部检索分组">收起</button>
          </span>
        </div>
        <div id="treePanel" class="side-view active">
          <div id="tree" class="tree"></div>
        </div>
        <div id="searchPanel" class="side-view">
          <div id="searchResults" class="search-results">
            <div class="empty">输入关键词检索全库标准实体</div>
          </div>
        </div>
      </section>
      <section id="detail" class="detail-pane">
        <div class="empty">选择一个节点查看属性</div>
      </section>
      <aside class="related-pane">
        <div class="related-list" id="relatedList"></div>
      </aside>
    </main>
  </div>
  <div id="vocabMenu" class="vocab-menu" role="listbox" aria-label="选择词表"></div>

  <script>
    const APP_VERSION = "20260628-preserve-related-search";

    function dataUrl(path) {
      const separator = path.includes("?") ? "&" : "?";
      return `${path}${separator}v=${APP_VERSION}`;
    }

    const state = {
      index: [],
      vocab: null,
      data: null,
      related: {},
      relatedCache: new Map(),
      searchIndex: null,
      searchQuery: "",
      searchGroups: [],
      searchOpenSections: {},
      activeSearchKey: "",
      sidePanel: "tree",
      selectedId: null,
      relatedOrder: null,
      relatedGroup: null,
      rendered: new Map(),
      expanded: new Set(),
    };

    const fields = [
      ["localId", "本地编号"],
      ["conceptName", "概念名"],
      ["preferredName", "正式名"],
      ["aliases", "异名"],
      ["englishNames", "英文名"],
      ["pinyinNames", "拼音名"],
      ["medicineSource", "来源"],
      ["materialName", "药材名"],
      ["medicinalPart", "药用部位"],
      ["sliceSpec", "饮片规格"],
      ["processingMethod", "炮制方法"],
      ["formulaCategory", "分类"],
      ["formulaSubcategory", "功用小类"],
      ["formulaCode", "方剂编码"],
      ["formulaSource", "来源"],
      ["formulaComposition", "组成"],
      ["formulaEfficacy", "功效"],
      ["formulaIndications", "主治"],
      ["formulaRemark", "备注"],
      ["definitions", "概念定义"],
      ["differentForms", "不同文字形式"],
      ["jianboSources", "来源简帛"],
      ["lineagePath", "所属路径"],
      ["definitionSources", "定义来源"],
      ["attachmentInfo", "附件信息"],
      ["otherTermTypes", "其他术语"],
      ["extraInfo", "补充信息"],
    ];

    const vocabPicker = document.getElementById("vocabPicker");
    const vocabButton = document.getElementById("vocabButton");
    const vocabLabel = document.getElementById("vocabLabel");
    const vocabMenu = document.getElementById("vocabMenu");
    const statsEl = document.getElementById("stats");
    const treeEl = document.getElementById("tree");
    const treePanel = document.getElementById("treePanel");
    const searchPanel = document.getElementById("searchPanel");
    const treeTab = document.getElementById("treeTab");
    const searchTab = document.getElementById("searchTab");
    const detailEl = document.getElementById("detail");
    const treeStatus = document.getElementById("treeStatus");
    const treeActions = document.getElementById("treeActions");
    const searchActions = document.getElementById("searchActions");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const relatedList = document.getElementById("relatedList");

    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    async function init() {
      state.index = await fetch(dataUrl("data/_index.json"), { cache: "no-store" }).then(r => r.json());
      document.body.appendChild(vocabMenu);
      renderVocabMenu();
      vocabButton.addEventListener("click", event => {
        event.stopPropagation();
        const open = !vocabMenu.classList.contains("open");
        vocabMenu.classList.toggle("open", open);
        vocabButton.setAttribute("aria-expanded", String(open));
        if (open) positionVocabMenu();
      });
      window.addEventListener("resize", () => {
        if (vocabMenu.classList.contains("open")) positionVocabMenu();
      });
      window.addEventListener("scroll", () => {
        if (vocabMenu.classList.contains("open")) positionVocabMenu();
      }, true);
      document.addEventListener("click", event => {
        if (!vocabPicker.contains(event.target) && !vocabMenu.contains(event.target)) {
          vocabMenu.classList.remove("open");
          vocabButton.setAttribute("aria-expanded", "false");
        }
      });
      document.getElementById("collapseLevelBtn").addEventListener("click", collapseToRootLevel);
      document.getElementById("collapseCurrentBtn").addEventListener("click", collapseOneLevel);
      document.getElementById("locateCurrentBtn").addEventListener("click", locateCurrentNode);
      document.getElementById("locateFromSearchBtn").addEventListener("click", locateSearchBox);
      document.getElementById("expandSearchGroupsBtn").addEventListener("click", () => setSearchGroupsOpen(true));
      document.getElementById("collapseSearchGroupsBtn").addEventListener("click", () => setSearchGroupsOpen(false));
      treeTab.addEventListener("click", () => switchSidePanel("tree"));
      searchTab.addEventListener("click", () => switchSidePanel("search"));
      searchInput.addEventListener("input", debounce(runSearch, 180));
      await loadVocab(0);
    }

    function switchSidePanel(panel) {
      state.sidePanel = panel === "search" ? "search" : "tree";
      const searchActive = state.sidePanel === "search";
      treeTab.classList.toggle("active", !searchActive);
      searchTab.classList.toggle("active", searchActive);
      treePanel.classList.toggle("active", !searchActive);
      searchPanel.classList.toggle("active", searchActive);
      treeActions.hidden = searchActive;
      searchActions.hidden = !searchActive;
    }

    function renderVocabMenu() {
      vocabMenu.innerHTML = state.index.map((item, idx) => `
        <button class="vocab-option" type="button" role="option" data-index="${idx}" aria-selected="false">
          <span class="vocab-option-name">${esc(item.name)}</span>
          <span class="vocab-option-category">${esc(item.category || "本体术语类")}</span>
        </button>
      `).join("");
      vocabMenu.querySelectorAll(".vocab-option").forEach(option => {
        option.addEventListener("click", event => {
          event.stopPropagation();
          vocabMenu.classList.remove("open");
          vocabButton.setAttribute("aria-expanded", "false");
          loadVocab(Number(option.dataset.index));
        });
      });
    }

    function positionVocabMenu() {
      const rect = vocabButton.getBoundingClientRect();
      const margin = 12;
      const width = Math.min(Math.max(rect.width, 360), window.innerWidth - margin * 2);
      vocabMenu.style.width = `${width}px`;
      vocabMenu.style.left = `${Math.max(margin, Math.min(rect.left, window.innerWidth - width - margin))}px`;
      vocabMenu.style.top = `${rect.bottom + 6}px`;
    }

    async function loadVocab(index, options = {}) {
      const meta = state.index[index];
      const preservedSearchQuery = state.searchQuery;
      const preservedSearchGroups = state.searchGroups;
      const preservedActiveSearchKey = state.activeSearchKey;
      const preservedSearchOpenSections = state.searchOpenSections;
      const preserveSearch = Boolean(options.preserveSearch);
      state.vocab = meta;
      const [data, related] = await Promise.all([
        fetch(dataUrl(`data/${encodeURIComponent(meta.file)}`), { cache: "no-store" }).then(r => r.json()),
        loadRelatedShard(meta.id),
      ]);
      state.data = data;
      state.related = related;
      state.selectedId = null;
      state.relatedOrder = null;
      state.relatedGroup = null;
      state.rendered.clear();
      state.expanded.clear();
      if (!preserveSearch) {
        state.searchQuery = "";
        state.searchGroups = [];
        state.searchOpenSections = {};
        state.activeSearchKey = "";
        searchInput.value = "";
        renderSearchResults();
        switchSidePanel("tree");
      } else {
        state.searchQuery = preservedSearchQuery;
        state.searchGroups = preservedSearchGroups;
        state.activeSearchKey = preservedActiveSearchKey;
        state.searchOpenSections = preservedSearchOpenSections;
      }
      vocabLabel.textContent = meta.name;
      vocabMenu.querySelectorAll(".vocab-option").forEach(option => {
        const active = Number(option.dataset.index) === index;
        option.classList.toggle("active", active);
        option.setAttribute("aria-selected", String(active));
      });
      renderStats(meta);
      renderTree();
      expandRootLevel();
      if (preserveSearch) renderSearchResults();
      detailEl.innerHTML = `<div class="empty">选择一个节点查看属性</div>`;
      renderRelated(null);
    }

    async function loadRelatedShard(vocabId) {
      if (state.relatedCache.has(vocabId)) return state.relatedCache.get(vocabId);
      const shard = await fetch(dataUrl(`data/related_exact/${encodeURIComponent(vocabId)}.json`), { cache: "no-store" })
        .then(r => r.ok ? r.json() : {})
        .catch(() => ({}));
      state.relatedCache.set(vocabId, shard);
      return shard;
    }

    function renderStats(meta) {
      statsEl.innerHTML = [
        ["节点", meta.nodes],
        ["根", meta.roots],
      ].map(([k, v]) => `<span class="pill">${k}: ${v}</span>`).join("");
    }

    function renderTree() {
      const roots = state.data.roots || [];
      treeEl.innerHTML = "";
      roots.forEach(id => treeEl.appendChild(renderNode(id, 0)));
      treeStatus.textContent = "";
    }

    function expandRootLevel() {
      const roots = state.data.roots || [];
      roots.forEach(rootId => toggleNode(rootId, true));
    }

    function renderNode(id, depth) {
      const node = state.data.nodes[id];
      const childIds = state.data.children[id] || [];
      const wrap = document.createElement("div");
      wrap.dataset.id = id;
      wrap.dataset.depth = depth;
      state.rendered.set(id, wrap);

      const row = document.createElement("div");
      row.className = "node-row";
      if (state.selectedId === id) row.classList.add("selected");
      row.style.paddingLeft = `${Math.min(depth * 16, 160)}px`;
      row.dataset.id = id;

      const twisty = document.createElement("div");
      twisty.className = childIds.length ? "twisty" : "twisty empty";
      twisty.textContent = childIds.length ? "▸" : "";
      twisty.title = childIds.length ? "展开/收起" : "";
      twisty.setAttribute("aria-label", childIds.length ? "展开或收起节点" : "");
      row.appendChild(twisty);

      const label = document.createElement("div");
      label.className = "node-label";
      label.textContent = node.label || id;
      row.appendChild(label);

      const meta = document.createElement("div");
      meta.className = "node-meta";
      meta.textContent = childIds.length ? childIds.length : "";
      row.appendChild(meta);

      if (childIds.length) {
        twisty.addEventListener("click", event => {
          event.stopPropagation();
          toggleNode(id);
        });
        label.addEventListener("dblclick", event => {
          event.stopPropagation();
          toggleNode(id);
        });
      }

      row.addEventListener("click", event => {
        event.stopPropagation();
        state.relatedOrder = null;
        state.relatedGroup = null;
        selectNode(id);
      });

      const children = document.createElement("div");
      children.className = "children";
      children.dataset.childrenOf = id;

      wrap.appendChild(row);
      wrap.appendChild(children);
      return wrap;
    }

    function toggleNode(id, forceOpen = null) {
      const wrap = state.rendered.get(id);
      if (!wrap) return;
      const childrenEl = wrap.querySelector(`[data-children-of="${CSS.escape(id)}"]`);
      const row = wrap.querySelector(".node-row");
      const twisty = wrap.querySelector(".twisty");
      const childIds = state.data.children[id] || [];
      if (!childIds.length) return;

      const shouldOpen = forceOpen === null ? !state.expanded.has(id) : forceOpen;
      if (shouldOpen) {
        if (!childrenEl.dataset.loaded) {
          const depth = Number(wrap.dataset.depth || 0) + 1;
          childIds.forEach(childId => childrenEl.appendChild(renderNode(childId, depth)));
          childrenEl.dataset.loaded = "1";
        }
        childrenEl.classList.add("open");
        twisty.textContent = "▾";
        state.expanded.add(id);
      } else {
        childrenEl.classList.remove("open");
        twisty.textContent = "▸";
        state.expanded.delete(id);
      }
    }

    function selectNode(id) {
      if (state.selectedId && state.rendered.has(state.selectedId)) {
        state.rendered.get(state.selectedId).querySelector(".node-row").classList.remove("selected");
      }
      state.selectedId = id;
      if (state.rendered.has(id)) {
        state.rendered.get(id).querySelector(".node-row").classList.add("selected");
      }
      renderDetail(state.data.nodes[id]);
      renderRelated(state.data.nodes[id]);
    }

    function badgeClass(value) {
      return "ok";
    }

    function renderDetail(node) {
      const visibleFields = fields.filter(([key]) => {
        const value = node[key];
        if (key === "preferredName" && sameDisplayValue(value, node.conceptName)) return false;
        return Array.isArray(value) ? value.length : String(value || "").trim();
      });
      const imagePaths = Array.isArray(node.imagePaths) ? node.imagePaths : [];
      detailEl.innerHTML = `
        <div class="detail-head">
          <div>
            <h1>${esc(node.label || node.id)}</h1>
            <div class="sub">${esc(node.localId || node.id)}</div>
          </div>
          <span class="badge ok">${esc(state.vocab?.id || "")}</span>
        </div>
        <div class="grid">
          ${visibleFields.map(([key, label]) => `
            <div class="key">${esc(fieldLabel(node, key, label))}</div>
            <div class="value">${renderFieldValue(key, node[key])}</div>
          `).join("")}
        </div>
        ${imagePaths.length ? `
          <div class="evidence-images">
            <h2>证据截图</h2>
            ${imagePaths.map((src, idx) => `
              <figure>
                <a href="${esc(src)}" target="_blank"><img src="${esc(src)}" alt="证据截图 ${idx + 1}" loading="lazy"></a>
                <figcaption>证据截图 ${idx + 1}</figcaption>
              </figure>
            `).join("")}
          </div>
        ` : ""}
      `;
    }

    function renderRelated(node) {
      if (!node) {
        relatedList.innerHTML = "";
        return;
      }
      const matches = state.related[node.id] || [];
      const relatedItems = buildRelatedItems(node, matches);
      relatedList.innerHTML = `
        ${renderEntityCard(node, relatedItems)}
        ${relatedItems.length ? `
          <div class="related-section-title">实体对齐项</div>
          ${relatedItems.map(renderRelatedItem).join("")}
        ` : `<div class="empty">暂无相关项</div>`}
      `;
      relatedList.querySelectorAll(".related-item").forEach(item => {
        item.addEventListener("click", () => {
          state.relatedOrder = Array.from(relatedList.querySelectorAll(".related-item"))
            .map(el => `${el.dataset.vocab || ""}::${el.dataset.id || ""}`);
          openRelated(item.dataset.vocab, item.dataset.id);
        });
      });
    }

    function buildRelatedItems(node, matches) {
      const current = {
        id: node.id,
        vocabId: state.vocab?.id || "",
        vocabName: state.vocab?.name || node.vocabularyName || "",
        vocabCategory: state.vocab?.category || "",
        vocabCategoryOrder: state.vocab?.categoryOrder ?? 99,
        vocabOrder: state.vocab?.vocabOrder ?? 9999,
        label: node.label || node.conceptName || node.preferredName || node.id,
        conceptName: node.conceptName || "",
        preferredName: node.preferredName || "",
        aliases: node.aliases || "",
        englishNames: node.englishNames || "",
        pinyinNames: node.pinyinNames || "",
        differentForms: node.differentForms || "",
        path: node.lineagePath || "",
        definition: node.definitions || "",
        formulaSource: node.formulaSource || "",
        formulaComposition: node.formulaComposition || "",
        formulaEfficacy: node.formulaEfficacy || "",
        formulaIndications: node.formulaIndications || "",
        formulaRemark: node.formulaRemark || "",
        isCurrent: true,
      };
      const currentKey = `${current.vocabId || ""}::${current.id || ""}`;
      const items = [];
      const seen = new Set();
      matches.forEach(item => {
        const key = `${item.vocabId || ""}::${item.id || ""}`;
        if (seen.has(key)) return;
        seen.add(key);
        items.push({ ...item, isCurrent: key === currentKey });
      });
      if (!seen.has(currentKey)) items.push(current);
      if (state.relatedOrder?.length) return applyRelatedOrder(items, currentKey);
      return items.sort(relatedItemSort);
    }

    function relatedKey(item) {
      return `${item.vocabId || ""}::${item.id || ""}`;
    }

    function applyRelatedOrder(items, currentKey) {
      if (!state.relatedOrder?.length) return items;
      const itemMap = new Map(items.map(item => [relatedKey(item), item]));
      if (!itemMap.has(currentKey)) return items;
      const ordered = [];
      state.relatedOrder.forEach(key => {
        const item = itemMap.get(key);
        if (!item) return;
        item.isCurrent = key === currentKey;
        ordered.push(item);
        itemMap.delete(key);
      });
      itemMap.forEach((item, key) => {
        item.isCurrent = key === currentKey;
        ordered.push(item);
      });
      return ordered;
    }

    function relatedItemSort(a, b) {
      return (a.vocabCategoryOrder ?? 99) - (b.vocabCategoryOrder ?? 99)
        || (a.vocabOrder ?? 9999) - (b.vocabOrder ?? 9999)
        || String(a.vocabName || a.vocabId).localeCompare(String(b.vocabName || b.vocabId), "zh-Hans-CN")
        || String(a.path || "").localeCompare(String(b.path || ""), "zh-Hans-CN")
        || String(a.label || a.conceptName || "").localeCompare(String(b.label || b.conceptName || ""), "zh-Hans-CN");
    }

    function renderRelatedItem(item) {
      const path = displayRelatedPath(item);
      const summary = relatedItemSummary(item);
      return `
        <button class="related-item${item.isCurrent ? " current" : ""}" type="button" data-vocab="${esc(item.vocabId)}" data-id="${esc(item.id)}">
          <span class="related-heading">
            <span class="related-vocab">${esc(item.vocabName || item.vocabId)}</span>
            ${item.vocabCategory ? `<span class="related-category">${esc(item.vocabCategory)}</span>` : ""}
          </span>
          ${path ? `<span class="related-path">${renderPath(path, { compact: true })}</span>` : ""}
          ${summary ? `<span class="related-definition">${esc(summary)}</span>` : ""}
        </button>
      `;
    }

    function relatedItemSummary(item) {
      if (item.definition) return item.definition;
      const parts = [
        item.formulaSource ? `来源：${item.formulaSource}` : "",
        item.formulaComposition ? `组成：${item.formulaComposition}` : "",
        item.formulaEfficacy ? `功效：${item.formulaEfficacy}` : "",
        item.formulaIndications ? `主治：${item.formulaIndications}` : "",
      ].filter(Boolean);
      return parts.join("；");
    }

    function renderFieldValue(key, value) {
      if (key === "lineagePath") return renderPath(value);
      if (key === "attachmentInfo") return renderRichAttachment(value);
      return esc(value || "");
    }

    function renderRichAttachment(value) {
      const text = String(value || "").trim();
      if (!text.includes("<table")) return esc(text);
      const caption = text.slice(0, text.indexOf("<table")).trim();
      const tableHtml = text.slice(text.indexOf("<table"));
      return `${caption ? `<div>${esc(caption)}</div>` : ""}<div class="table-wrap">${sanitizeTableHtml(tableHtml)}</div>`;
    }

    function sanitizeTableHtml(html) {
      const template = document.createElement("template");
      template.innerHTML = html;
      const allowed = new Set(["TABLE", "TBODY", "THEAD", "TR", "TD", "TH"]);
      const cleanNode = node => {
        if (node.nodeType === Node.TEXT_NODE) return document.createTextNode(node.textContent || "");
        if (node.nodeType !== Node.ELEMENT_NODE || !allowed.has(node.tagName)) {
          const frag = document.createDocumentFragment();
          node.childNodes.forEach(child => frag.appendChild(cleanNode(child)));
          return frag;
        }
        const el = document.createElement(node.tagName.toLowerCase());
        ["rowspan", "colspan"].forEach(attr => {
          const raw = node.getAttribute(attr);
          const num = raw && /^\d+$/.test(raw) ? Math.min(Number(raw), 20) : 0;
          if (num > 1) el.setAttribute(attr, String(num));
        });
        node.childNodes.forEach(child => el.appendChild(cleanNode(child)));
        return el;
      };
      const frag = document.createDocumentFragment();
      template.content.childNodes.forEach(child => frag.appendChild(cleanNode(child)));
      const holder = document.createElement("div");
      holder.appendChild(frag);
      return holder.innerHTML;
    }

    function renderPath(value, options = {}) {
      const parts = String(value || "").split(/[｜|]/).map(part => part.trim()).filter(Boolean);
      if (!parts.length) return "";
      const separator = options.compact ? "›" : "›";
      return `<span class="path-display">${parts.map((part, idx) => `
        ${idx ? `<span class="path-separator">${separator}</span>` : ""}
        <span class="path-segment">${esc(part)}</span>
      `).join("")}</span>`;
    }

    function displayRelatedPath(item) {
      const path = String(item.path || "").trim();
      if (!path) return path;
      const vocabName = String(item.vocabName || "").trim();
      const parts = path.split("｜").map(part => part.trim()).filter(Boolean);
      if (parts.length > 1 && normalizePathLabel(parts[0]) === normalizePathLabel(vocabName)) {
        return parts.slice(1).join("｜");
      }
      return path;
    }

    function normalizePathLabel(value) {
      return String(value || "")
        .replace(/gb\s*[tT]/gi, "GBT")
        .replace(/[\s\-－—_/／、，,：:（）()《》〈〉\[\]【】]/g, "")
        .toLowerCase();
    }

    function normalizeTerm(value) {
      return String(value || "")
        .replace(/\s+/g, "")
        .replace(/[；;、，,。．.·・|｜:：\-－—_（）()《》〈〉\[\]【】"'“”‘’]/g, "")
        .toLowerCase();
    }

    function renderEntityCard(node, relatedItems) {
      const summary = buildEntitySummary(node, relatedItems);
      const rows = [
        ["标准名称", summary.standardName],
        ["名称集合", summary.names],
        ["英文名", summary.englishNames],
        ["拼音名", summary.pinyinNames],
        ["相关节点", summary.relatedCount ? `${summary.relatedCount} 个实体对齐项` : ""],
      ].filter(([, value]) => Array.isArray(value) ? value.length : String(value || "").trim());
      return `
        <section class="entity-card">
          <h3>标准实体摘要</h3>
          ${rows.map(([label, value]) => `
            <div class="entity-row">
              <div class="entity-key">${esc(label)}</div>
              ${Array.isArray(value)
                ? `<div class="entity-tags">${value.slice(0, 36).map(item => `<span class="entity-tag">${esc(item)}</span>`).join("")}</div>`
                : `<div class="entity-value">${esc(value)}</div>`}
            </div>
          `).join("")}
        </section>
      `;
    }

    function buildEntitySummary(node, relatedItems) {
      const records = relatedItems?.length ? relatedItems : [node];
      const rawNames = collectUnique(records, ["conceptName", "preferredName", "label", "aliases", "differentForms", "matchedTerms"]);
      const latinNames = rawNames.filter(looksLatinTerm);
      const names = rawNames.filter(value => !looksLatinTerm(value));
      return {
        standardName: chooseStandardName(node, records),
        names,
        englishNames: mergeUnique(collectUnique(records, ["englishNames"]), latinNames),
        pinyinNames: collectUnique(records, ["pinyinNames"]),
        relatedCount: records.length,
      };
    }

    function chooseStandardName(node, records) {
      const candidates = (records?.length ? records : [node])
        .map(record => ({
          name: record?.conceptName || record?.preferredName || record?.label || record?.id || "",
          priority: standardNamePriority(record),
          order: record?.vocabOrder ?? 9999,
        }))
        .filter(item => String(item.name || "").trim());
      if (!candidates.length) return node.conceptName || node.preferredName || node.label || node.id;
      candidates.sort((a, b) => a.priority - b.priority
        || a.order - b.order
        || String(a.name).localeCompare(String(b.name), "zh-Hans-CN"));
      return candidates[0].name;
    }

    function standardNamePriority(record) {
      const name = normalizePathLabel(record?.vocabName || "");
      if (name.includes("GBT16751")) return 0;
      if (name.includes("GBT42467")) return 1;
      if (name.includes("GBT31773")) return 2;
      if (name.includes("TCIATCM0202025") || name.includes("T/CIATCM 020-2025")) return 3;
      return 10;
    }

    function collectUnique(records, keys) {
      const values = [];
      const seen = new Set();
      records.forEach(record => {
        keys.forEach(key => splitValues(record?.[key]).forEach(value => {
          const normalized = value.replace(/\s+/g, "").toLowerCase();
          if (!normalized || seen.has(normalized)) return;
          seen.add(normalized);
          values.push(value);
        }));
      });
      return values;
    }

    function mergeUnique(...groups) {
      const values = [];
      const seen = new Set();
      groups.flat().forEach(value => {
        const normalized = String(value || "").replace(/\s+/g, "").toLowerCase();
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        values.push(value);
      });
      return values;
    }

    function looksLatinTerm(value) {
      return /[A-Za-z]/.test(String(value || ""));
    }

    function splitValues(value) {
      if (Array.isArray(value)) return value.flatMap(item => splitValues(item));
      return String(value || "").split(/[;；｜|、,，\n]+/).map(item => item.trim()).filter(Boolean);
    }

    async function openRelated(vocabId, nodeId) {
      const relatedOrder = state.relatedOrder ? [...state.relatedOrder] : null;
      state.activeSearchKey = "";
      if (state.vocab?.id !== vocabId) {
        const index = state.index.findIndex(item => item.id === vocabId);
        if (index < 0) return;
        await loadVocab(index, { preserveSearch: true });
        state.relatedOrder = relatedOrder;
      }
      renderSearchResults();
      revealNode(nodeId, { preserveRelatedOrder: true });
    }

    function fieldLabel(node, key, fallback) {
      if (key === "definitions" && node.definitionsLabel) return node.definitionsLabel;
      return fallback;
    }

    function sameDisplayValue(a, b) {
      return String(a || "").trim() && String(a || "").trim() === String(b || "").trim();
    }

    function collapseToRootLevel() {
      state.expanded.clear();
      state.rendered.clear();
      renderTree();
      expandRootLevel();
    }

    function collapseOneLevel() {
      const expandedNodes = [...state.expanded].map(id => {
        const wrap = state.rendered.get(id);
        return wrap ? { id, depth: Number(wrap.dataset.depth || 0) } : null;
      }).filter(Boolean);
      const maxDepth = Math.max(-1, ...expandedNodes.map(item => item.depth));
      if (maxDepth <= 0) return;
      expandedNodes
        .filter(item => item.depth === maxDepth)
        .forEach(item => toggleNode(item.id, false));
    }

    function locateCurrentNode() {
      if (!state.selectedId) return;
      switchSidePanel("tree");
      revealNode(state.selectedId, { preserveRelatedOrder: true });
    }

    function locateSearchBox() {
      switchSidePanel("search");
      const pane = document.querySelector(".tree-pane");
      const active = searchResults.querySelector(".result-item.active");
      if (active) {
        active.scrollIntoView({ block: "center" });
        return;
      }
      searchInput.focus();
      if (pane) pane.scrollTop = 0;
    }

    function setSearchGroupsOpen(open) {
      searchResults.querySelectorAll(".search-group").forEach(group => {
        group.open = open;
        if (group.dataset.section) state.searchOpenSections[group.dataset.section] = open;
      });
    }

    async function loadSearchIndex() {
      if (state.searchIndex) return state.searchIndex;
      state.searchIndex = await fetch(dataUrl("data/search_index.json"), { cache: "no-store" }).then(r => r.json());
      return state.searchIndex;
    }

    async function runSearch() {
      const rawQuery = searchInput.value.trim();
      const query = rawQuery.toLowerCase();
      state.searchQuery = rawQuery;
      state.activeSearchKey = "";
      state.searchOpenSections = {};
      switchSidePanel(rawQuery ? "search" : "tree");
      if (!query) {
        state.searchGroups = [];
        renderSearchResults();
        return;
      }
      searchResults.innerHTML = `<div class="search-summary">检索中...</div>`;
      const records = await loadSearchIndex();
      const hits = records.filter(record => record.text.includes(query));
      state.searchGroups = buildSearchGroups(hits, rawQuery).slice(0, 80);
      renderSearchResults();
    }

    function buildSearchGroups(records, rawQuery) {
      const groups = new Map();
      records.forEach(record => {
        const match = bestSearchMatch(record, rawQuery);
        if (!match) return;
        const entityName = searchEntityName(record, match);
        const key = normalizeTerm(entityName);
        if (!key) return;
        if (!groups.has(key)) {
          groups.set(key, {
            key,
            entityName,
            records: [],
            bestMatch: match,
            currentCount: 0,
            otherCount: 0,
            bestRecord: record,
          });
        }
        const group = groups.get(key);
        group.records.push({ ...record, searchMatch: match });
        if (record.vocabId === state.vocab?.id) group.currentCount += 1;
        else group.otherCount += 1;
        if (compareSearchRecords(record, match, group.bestRecord, group.bestMatch) < 0) {
          group.bestRecord = record;
          group.bestMatch = match;
          group.entityName = searchEntityName(record, match);
        }
      });
      return [...groups.values()].sort(searchGroupSort);
    }

    function renderSearchResults() {
      if (!state.searchQuery) {
        searchResults.innerHTML = `<div class="empty">输入关键词检索全库标准实体</div>`;
        return;
      }
      const groups = state.searchGroups || [];
      const displayGroups = rebaseSearchGroups(groups);
      state.searchGroups = displayGroups;
      searchResults.innerHTML = groups.length
        ? `
          <div class="search-summary">
            <span>${esc(state.searchQuery)} · ${displayGroups.length} 个标准实体</span>
            <span>按命中字段排序</span>
          </div>
          ${renderSearchGroupSections(displayGroups)}
        `
        : `<div class="empty">无匹配</div>`;
      searchResults.querySelectorAll(".result-item").forEach(item => {
        item.addEventListener("click", () => openSearchResult(item.dataset.vocab, item.dataset.id, item.dataset.key));
      });
      searchResults.querySelectorAll(".search-group").forEach(group => {
        group.addEventListener("toggle", () => {
          if (group.dataset.section) state.searchOpenSections[group.dataset.section] = group.open;
        });
      });
    }

    function rebaseSearchGroups(groups) {
      return groups.map(group => {
        const next = { ...group };
        next.currentCount = 0;
        next.otherCount = 0;
        next.records = group.records || [];
        next.bestRecord = next.records[0] || group.bestRecord;
        next.bestMatch = next.bestRecord?.searchMatch || group.bestMatch;
        next.records.forEach(record => {
          if (record.vocabId === state.vocab?.id) next.currentCount += 1;
          else next.otherCount += 1;
          if (compareSearchRecords(record, record.searchMatch, next.bestRecord, next.bestMatch) < 0) {
            next.bestRecord = record;
            next.bestMatch = record.searchMatch;
            next.entityName = searchEntityName(record, record.searchMatch);
          }
        });
        return next;
      }).sort(searchGroupSort);
    }

    function renderSearchGroupSections(groups) {
      const sections = [
        { title: "概念名", keys: new Set(["conceptName"]) },
        { title: "正式名", keys: new Set(["preferredName"]) },
        { title: "异名", keys: new Set(["aliases", "differentForms"]) },
        { title: "英文名 / 拼音名", keys: new Set(["englishNames", "pinyinNames"]) },
        { title: "定义 / 路径 / 来源", keys: new Set(["definition", "path", "definitionSources", "label"]) },
      ];
      const used = new Set();
      const html = sections.map((section, idx) => {
        const items = groups.filter(group => section.keys.has(group.bestMatch?.key || ""));
        items.forEach(group => used.add(group.key));
        if (!items.length) return "";
        return `
          <details class="search-group" data-section="${esc(section.title)}" ${searchSectionOpen(section.title) ? "open" : ""}>
            <summary><span>${esc(section.title)}</span><span class="search-group-count">${items.length}</span></summary>
            <div class="search-group-body">${items.map(group => renderSearchGroup(group, section.keys.size === 1 && section.keys.has("conceptName"))).join("")}</div>
          </details>
        `;
      }).join("");
      const leftovers = groups.filter(group => !used.has(group.key));
      return html + (leftovers.length ? `
        <details class="search-group" data-section="其他命中" ${searchSectionOpen("其他命中") ? "open" : ""}>
          <summary><span>其他命中</span><span class="search-group-count">${leftovers.length}</span></summary>
          <div class="search-group-body">${leftovers.map(group => renderSearchGroup(group, false)).join("")}</div>
        </details>
      ` : "");
    }

    function searchSectionOpen(title) {
      return Object.prototype.hasOwnProperty.call(state.searchOpenSections, title)
        ? state.searchOpenSections[title]
        : true;
    }

    function renderSearchGroup(group, inConceptNameSection = false) {
      const record = group.bestRecord;
      const match = group.bestMatch;
      const isDirectConceptName = match?.key === "conceptName";
      const context = searchContext(record, match, state.searchQuery);
      return `
        <button class="result-item${state.activeSearchKey === group.key ? " active" : ""}" type="button"
          data-key="${esc(group.key)}" data-vocab="${esc(record.vocabId)}" data-id="${esc(record.id)}">
          <span class="result-label">
            <span>${highlightText(group.entityName, state.searchQuery)}</span>
            ${!inConceptNameSection ? `<span class="result-vocab-tag">${esc(record.vocabName || record.vocabId || "")}</span>` : ""}
          </span>
          ${!isDirectConceptName && context ? `<span class="result-context">${context}</span>` : ""}
        </button>
      `;
    }

    function searchGroupSort(a, b) {
      return searchMatchRank(a.bestMatch) - searchMatchRank(b.bestMatch)
        || compareSearchRecordBase(a.bestRecord, b.bestRecord)
        || String(a.entityName).localeCompare(String(b.entityName), "zh-Hans-CN");
    }

    function compareSearchRecords(aRecord, aMatch, bRecord, bMatch) {
      return searchMatchRank(aMatch) - searchMatchRank(bMatch)
        || compareSearchRecordBase(aRecord, bRecord);
    }

    function compareSearchRecordBase(a, b) {
      return (a.vocabCategoryOrder ?? 99) - (b.vocabCategoryOrder ?? 99)
        || (a.vocabOrder ?? 9999) - (b.vocabOrder ?? 9999)
        || String(a.vocabName).localeCompare(String(b.vocabName), "zh-Hans-CN")
        || String(a.path).localeCompare(String(b.path), "zh-Hans-CN")
        || String(a.label).localeCompare(String(b.label), "zh-Hans-CN");
    }

    function bestSearchMatch(record, rawQuery) {
      const query = String(rawQuery || "").toLowerCase();
      const fields = [
        ["conceptName", "概念名", 0],
        ["preferredName", "正式名", 1],
        ["aliases", "异名", 2],
        ["differentForms", "不同文字形式", 3],
        ["englishNames", "英文名", 4],
        ["pinyinNames", "拼音名", 5],
        ["definition", "定义", 6],
        ["path", "所属路径", 7],
        ["definitionSources", "来源", 8],
        ["label", "节点名", 9],
      ];
      let best = null;
      fields.forEach(([key, label, rank]) => {
        const value = String(record[key] || "");
        if (!value || !value.toLowerCase().includes(query)) return;
        const exact = normalizeTerm(value) === normalizeTerm(rawQuery);
        const candidate = { key, label, rank, value, exact };
        if (!best || searchMatchRank(candidate) < searchMatchRank(best)) best = candidate;
      });
      return best;
    }

    function searchMatchRank(match) {
      if (!match) return 999;
      return (match.rank ?? 99) * 2 + (match.exact ? 0 : 1);
    }

    function searchEntityName(record, match) {
      return record.conceptName || record.preferredName || record.label || match?.value || record.id;
    }

    function searchContext(record, match, query) {
      const field = match?.label || "";
      const value = match?.value || "";
      const text = snippetFor(value, query, 64);
      return `<span class="result-pill">${esc(field)}</span>${highlightText(text, query)}`;
    }

    function snippetFor(value, query, radius = 50) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      const q = String(query || "").trim();
      if (!q || text.length <= radius * 2) return text;
      const lower = text.toLowerCase();
      const idx = lower.indexOf(q.toLowerCase());
      if (idx < 0) return text.slice(0, radius * 2) + "…";
      const start = Math.max(0, idx - radius);
      const end = Math.min(text.length, idx + q.length + radius);
      return `${start ? "…" : ""}${text.slice(start, end)}${end < text.length ? "…" : ""}`;
    }

    function highlightText(value, query) {
      const text = esc(value || "");
      const raw = String(query || "").trim();
      if (!raw) return text;
      const escaped = raw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      try {
        return text.replace(new RegExp(escaped, "gi"), match => `<mark class="hit">${match}</mark>`);
      } catch {
        return text;
      }
    }

    async function openSearchResult(vocabId, nodeId, groupKey = "") {
      state.activeSearchKey = groupKey || "";
      if (state.vocab?.id !== vocabId) {
        const index = state.index.findIndex(item => item.id === vocabId);
        if (index < 0) return;
        await loadVocab(index, { preserveSearch: true });
      }
      renderSearchResults();
      switchSidePanel("search");
      revealNode(nodeId, { preserveRelatedOrder: false });
    }

    function revealNode(id, options = {}) {
      if (!options.preserveRelatedOrder) {
        state.relatedOrder = null;
        state.relatedGroup = null;
      }
      const node = state.data.nodes[id];
      if (!node) return;
      const lineage = [];
      let current = node;
      const guard = new Set();
      while (current && current.parent && current.parent !== "0" && !guard.has(current.parent)) {
        guard.add(current.parent);
        lineage.unshift(current.parent);
        current = state.data.nodes[current.parent];
      }
      lineage.forEach(parentId => {
        if (!state.rendered.has(parentId)) {
          const parent = state.data.nodes[parentId];
          if (parent && parent.parent && state.rendered.has(parent.parent)) {
            toggleNode(parent.parent, true);
          }
        }
        toggleNode(parentId, true);
      });
      selectNode(id);
      const wrap = state.rendered.get(id);
      if (wrap) wrap.scrollIntoView({ block: "center" });
    }

    function debounce(fn, delay) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    init().catch(error => {
      treeStatus.textContent = "加载失败";
      detailEl.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
      console.error(error);
    });
  </script>
</body>
</html>
