<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中医本体词表浏览器</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --panel: #fffefa;
      --panel-soft: #fbfaf5;
      --line: #ddd8cf;
      --text: #222;
      --muted: #666;
      --accent: #2f6f73;
      --accent-soft: #e6f0ee;
      --warn: #9a5b00;
      --warn-soft: #fff4d7;
      --bad: #9b2f2f;
      --bad-soft: #fde8e8;
      --code: #26333d;
      --shadow: 0 1px 2px rgba(42, 36, 24, .04);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      min-height: 640px;
    }
    header {
      position: relative;
      z-index: 100;
      display: grid;
      grid-template-columns: minmax(260px, 520px) 1fr minmax(240px, 420px);
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 244, .96);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
    }
    input:focus, .vocab-button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47, 111, 115, .12);
    }
    .vocab-picker {
      position: relative;
      z-index: 101;
      min-width: 0;
    }
    .vocab-button {
      width: 100%;
      height: 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .vocab-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .vocab-caret {
      color: var(--muted);
      font-size: 12px;
    }
    .vocab-menu {
      position: fixed;
      top: calc(100% + 6px);
      left: 0;
      z-index: 10000;
      width: min(520px, calc(100vw - 32px));
      max-height: min(68vh, 560px);
      overflow-y: auto;
      overscroll-behavior: contain;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefa;
      box-shadow: 0 14px 34px rgba(42, 36, 24, .14);
    }
    .vocab-menu.open { display: block; }
    .vocab-option {
      min-height: 32px;
      height: auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 7px 8px;
      text-align: left;
      color: var(--text);
      white-space: normal;
      line-height: 1.35;
    }
    .vocab-option-name {
      min-width: 0;
    }
    .vocab-option-category {
      align-self: center;
      border: 1px solid #d6d1c6;
      border-radius: 999px;
      padding: 1px 6px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .vocab-option:hover { background: #f0eee7; color: var(--accent); }
    .vocab-option.active {
      background: var(--accent-soft);
      color: #0f4d47;
      font-weight: 600;
    }
    .stats {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      color: var(--muted);
      white-space: nowrap;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff;
      font-size: 12px;
    }
    .main {
      display: grid;
      grid-template-columns: minmax(300px, 25vw) minmax(460px, 1fr) minmax(300px, 25vw);
      min-height: 0;
    }
    .tree-pane, .detail-pane, .related-pane {
      min-height: 0;
      overflow: auto;
    }
    .tree-pane {
      border-right: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .tree-toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 245, .96);
      backdrop-filter: blur(6px);
      color: var(--muted);
      font-size: 12px;
    }
    button {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 0 9px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .tree {
      padding: 8px 4px 24px;
    }
    .node-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      min-height: 30px;
      border-radius: 6px;
      margin: 1px 4px;
      padding-right: 8px;
      cursor: pointer;
    }
    .node-row:hover { background: #f0eee7; }
    .node-row.selected {
      background: var(--accent-soft);
      color: #0f4d47;
      font-weight: 600;
    }
    .twisty {
      width: 22px;
      height: 24px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .node-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-meta {
      color: var(--muted);
      font-size: 12px;
      margin-left: 8px;
    }
    .children { display: none; }
    .children.open { display: block; }
    .detail-pane {
      background: var(--panel);
      padding: 18px 22px 40px;
    }
    .related-pane {
      border-left: 1px solid var(--line);
      background: #f8f6ef;
      padding: 14px 12px 32px;
    }
    .related-list {
      display: grid;
      gap: 8px;
    }
    .related-section-title {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .entity-card {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .entity-card h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.3;
    }
    .entity-row {
      display: grid;
      gap: 3px;
    }
    .entity-key {
      color: var(--muted);
      font-size: 12px;
    }
    .entity-value {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .entity-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .entity-tag {
      max-width: 100%;
      border: 1px solid #d6d1c6;
      border-radius: 999px;
      padding: 2px 7px;
      background: #fbfaf5;
      color: #34302a;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-word;
    }
    .related-item {
      width: 100%;
      height: auto;
      display: grid;
      gap: 5px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefa;
      text-align: left;
      color: var(--text);
    }
    .related-item:hover {
      border-color: var(--accent);
      color: var(--text);
      background: #fff;
    }
    .related-vocab {
      color: var(--accent);
      font-size: 12px;
      line-height: 1.35;
    }
    .related-path, .related-match, .related-definition {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }
    .related-definition {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 24px;
      line-height: 1.25;
      margin: 0 0 6px;
      letter-spacing: 0;
    }
    .sub {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .badge {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      border: 1px solid var(--line);
      white-space: nowrap;
    }
    .badge.ok { background: var(--accent-soft); border-color: #b7d9d4; color: #126158; }
    .badge.warn { background: var(--warn-soft); border-color: #edcf87; color: var(--warn); }
    .badge.bad { background: var(--bad-soft); border-color: #efb0b0; color: var(--bad); }
    .grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .key, .value {
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
    }
    .key {
      background: #f7f5ef;
      color: var(--muted);
      font-size: 12px;
    }
    .value {
      min-width: 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .grid .key:last-of-type, .grid .value:last-child { border-bottom: 0; }
    .evidence-images {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }
    .evidence-images h2 {
      margin: 0;
      font-size: 16px;
    }
    .evidence-images figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      overflow-x: auto;
    }
    .evidence-images img {
      display: block;
      max-width: 100%;
      height: auto;
      background: var(--panel);
    }
    .evidence-images figcaption {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      display: grid;
      place-items: center;
      min-height: 360px;
      text-align: center;
    }
    .search-results {
      display: none;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .search-results.open { display: block; }
    .result-item {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(96px, 1fr) minmax(80px, 45%);
      align-items: center;
      gap: 10px;
    }
    .result-item:hover { background: #f0eee7; }
    .result-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-vocab {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }
    @media (max-width: 860px) {
      .app { height: auto; min-height: 100vh; }
      header { grid-template-columns: 1fr; height: auto; }
      .vocab-menu {
        width: calc(100vw - 24px);
        max-height: 70vh;
        overflow: auto;
      }
      .main { grid-template-columns: 1fr; }
      .tree-pane { height: 45vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .related-pane { border-left: 0; border-top: 1px solid var(--line); }
      .grid { grid-template-columns: 1fr; }
      .key { border-bottom: 0; padding-bottom: 3px; }
      .value { padding-top: 3px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="vocab-picker" id="vocabPicker">
        <button id="vocabButton" class="vocab-button" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="vocab-label" id="vocabLabel">选择词表</span>
          <span class="vocab-caret">▾</span>
        </button>
      </div>
      <div class="stats" id="stats"></div>
      <input id="searchInput" placeholder="搜索概念名 / ID / 异名" />
    </header>
    <main class="main">
      <section class="tree-pane">
        <div class="tree-toolbar">
          <span id="treeStatus">加载中</span>
          <span>
            <button id="collapseBtn">收起</button>
          </span>
        </div>
        <div id="searchResults" class="search-results"></div>
        <div id="tree" class="tree"></div>
      </section>
      <section id="detail" class="detail-pane">
        <div class="empty">选择一个节点查看属性</div>
      </section>
      <aside class="related-pane">
        <div class="related-list" id="relatedList"></div>
      </aside>
    </main>
  </div>
  <div id="vocabMenu" class="vocab-menu" role="listbox" aria-label="选择词表"></div>

  <script>
    const APP_VERSION = "20260623-compact-search";

    function dataUrl(path) {
      const separator = path.includes("?") ? "&" : "?";
      return `${path}${separator}v=${APP_VERSION}`;
    }

    const state = {
      index: [],
      vocab: null,
      data: null,
      related: {},
      relatedCache: new Map(),
      searchIndex: null,
      selectedId: null,
      rendered: new Map(),
      expanded: new Set(),
    };

    const fields = [
      ["localId", "本地编号"],
      ["conceptName", "概念名"],
      ["preferredName", "正式名"],
      ["aliases", "异名"],
      ["englishNames", "英文名"],
      ["pinyinNames", "拼音名"],
      ["definitions", "概念定义"],
      ["differentForms", "不同文字形式"],
      ["jianboSources", "来源简帛"],
      ["lineagePath", "所属路径"],
      ["definitionSources", "定义来源"],
      ["attachmentInfo", "附件信息"],
      ["otherTermTypes", "其他术语"],
      ["extraInfo", "补充信息"],
    ];

    const vocabPicker = document.getElementById("vocabPicker");
    const vocabButton = document.getElementById("vocabButton");
    const vocabLabel = document.getElementById("vocabLabel");
    const vocabMenu = document.getElementById("vocabMenu");
    const statsEl = document.getElementById("stats");
    const treeEl = document.getElementById("tree");
    const detailEl = document.getElementById("detail");
    const treeStatus = document.getElementById("treeStatus");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const relatedList = document.getElementById("relatedList");

    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    async function init() {
      state.index = await fetch(dataUrl("data/_index.json"), { cache: "no-store" }).then(r => r.json());
      document.body.appendChild(vocabMenu);
      renderVocabMenu();
      vocabButton.addEventListener("click", event => {
        event.stopPropagation();
        const open = !vocabMenu.classList.contains("open");
        vocabMenu.classList.toggle("open", open);
        vocabButton.setAttribute("aria-expanded", String(open));
        if (open) positionVocabMenu();
      });
      window.addEventListener("resize", () => {
        if (vocabMenu.classList.contains("open")) positionVocabMenu();
      });
      window.addEventListener("scroll", () => {
        if (vocabMenu.classList.contains("open")) positionVocabMenu();
      }, true);
      document.addEventListener("click", event => {
        if (!vocabPicker.contains(event.target) && !vocabMenu.contains(event.target)) {
          vocabMenu.classList.remove("open");
          vocabButton.setAttribute("aria-expanded", "false");
        }
      });
      document.getElementById("collapseBtn").addEventListener("click", collapseAll);
      searchInput.addEventListener("input", debounce(runSearch, 180));
      await loadVocab(0);
    }

    function renderVocabMenu() {
      vocabMenu.innerHTML = state.index.map((item, idx) => `
        <button class="vocab-option" type="button" role="option" data-index="${idx}" aria-selected="false">
          <span class="vocab-option-name">${esc(item.name)}</span>
          <span class="vocab-option-category">${esc(item.category || "本体术语类")}</span>
        </button>
      `).join("");
      vocabMenu.querySelectorAll(".vocab-option").forEach(option => {
        option.addEventListener("click", event => {
          event.stopPropagation();
          vocabMenu.classList.remove("open");
          vocabButton.setAttribute("aria-expanded", "false");
          loadVocab(Number(option.dataset.index));
        });
      });
    }

    function positionVocabMenu() {
      const rect = vocabButton.getBoundingClientRect();
      const margin = 12;
      const width = Math.min(Math.max(rect.width, 360), window.innerWidth - margin * 2);
      vocabMenu.style.width = `${width}px`;
      vocabMenu.style.left = `${Math.max(margin, Math.min(rect.left, window.innerWidth - width - margin))}px`;
      vocabMenu.style.top = `${rect.bottom + 6}px`;
    }

    async function loadVocab(index) {
      const meta = state.index[index];
      state.vocab = meta;
      const [data, related] = await Promise.all([
        fetch(dataUrl(`data/${encodeURIComponent(meta.file)}`), { cache: "no-store" }).then(r => r.json()),
        loadRelatedShard(meta.id),
      ]);
      state.data = data;
      state.related = related;
      state.selectedId = null;
      state.rendered.clear();
      state.expanded.clear();
      searchInput.value = "";
      searchResults.classList.remove("open");
      vocabLabel.textContent = meta.name;
      vocabMenu.querySelectorAll(".vocab-option").forEach(option => {
        const active = Number(option.dataset.index) === index;
        option.classList.toggle("active", active);
        option.setAttribute("aria-selected", String(active));
      });
      renderStats(meta);
      renderTree();
      expandRootLevel();
      detailEl.innerHTML = `<div class="empty">选择一个节点查看属性</div>`;
      renderRelated(null);
    }

    async function loadRelatedShard(vocabId) {
      if (state.relatedCache.has(vocabId)) return state.relatedCache.get(vocabId);
      const shard = await fetch(dataUrl(`data/related_exact/${encodeURIComponent(vocabId)}.json`), { cache: "no-store" })
        .then(r => r.ok ? r.json() : {})
        .catch(() => ({}));
      state.relatedCache.set(vocabId, shard);
      return shard;
    }

    function renderStats(meta) {
      statsEl.innerHTML = [
        ["节点", meta.nodes],
        ["根", meta.roots],
      ].map(([k, v]) => `<span class="pill">${k}: ${v}</span>`).join("");
    }

    function renderTree() {
      const roots = state.data.roots || [];
      treeEl.innerHTML = "";
      roots.forEach(id => treeEl.appendChild(renderNode(id, 0)));
      treeStatus.textContent = `${roots.length} 个根节点`;
    }

    function expandRootLevel() {
      const roots = state.data.roots || [];
      roots.forEach(rootId => toggleNode(rootId, true));
    }

    function renderNode(id, depth) {
      const node = state.data.nodes[id];
      const childIds = state.data.children[id] || [];
      const wrap = document.createElement("div");
      wrap.dataset.id = id;
      wrap.dataset.depth = depth;
      state.rendered.set(id, wrap);

      const row = document.createElement("div");
      row.className = "node-row";
      row.style.paddingLeft = `${Math.min(depth * 16, 160)}px`;
      row.dataset.id = id;

      const twisty = document.createElement("div");
      twisty.className = "twisty";
      twisty.textContent = childIds.length ? "▸" : "";
      row.appendChild(twisty);

      const label = document.createElement("div");
      label.className = "node-label";
      label.textContent = node.label || id;
      row.appendChild(label);

      const meta = document.createElement("div");
      meta.className = "node-meta";
      meta.textContent = childIds.length ? childIds.length : "";
      row.appendChild(meta);

      row.addEventListener("click", event => {
        event.stopPropagation();
        selectNode(id);
        if (childIds.length) toggleNode(id);
      });

      const children = document.createElement("div");
      children.className = "children";
      children.dataset.childrenOf = id;

      wrap.appendChild(row);
      wrap.appendChild(children);
      return wrap;
    }

    function toggleNode(id, forceOpen = null) {
      const wrap = state.rendered.get(id);
      if (!wrap) return;
      const childrenEl = wrap.querySelector(`[data-children-of="${CSS.escape(id)}"]`);
      const row = wrap.querySelector(".node-row");
      const twisty = wrap.querySelector(".twisty");
      const childIds = state.data.children[id] || [];
      if (!childIds.length) return;

      const shouldOpen = forceOpen === null ? !state.expanded.has(id) : forceOpen;
      if (shouldOpen) {
        if (!childrenEl.dataset.loaded) {
          const depth = Number(wrap.dataset.depth || 0) + 1;
          childIds.forEach(childId => childrenEl.appendChild(renderNode(childId, depth)));
          childrenEl.dataset.loaded = "1";
        }
        childrenEl.classList.add("open");
        twisty.textContent = "▾";
        state.expanded.add(id);
      } else {
        childrenEl.classList.remove("open");
        twisty.textContent = "▸";
        state.expanded.delete(id);
      }
    }

    function selectNode(id) {
      if (state.selectedId && state.rendered.has(state.selectedId)) {
        state.rendered.get(state.selectedId).querySelector(".node-row").classList.remove("selected");
      }
      state.selectedId = id;
      if (state.rendered.has(id)) {
        state.rendered.get(id).querySelector(".node-row").classList.add("selected");
      }
      renderDetail(state.data.nodes[id]);
      renderRelated(state.data.nodes[id]);
    }

    function badgeClass(value) {
      return "ok";
    }

    function renderDetail(node) {
      const visibleFields = fields.filter(([key]) => {
        const value = node[key];
        return Array.isArray(value) ? value.length : String(value || "").trim();
      });
      const imagePaths = Array.isArray(node.imagePaths) ? node.imagePaths : [];
      detailEl.innerHTML = `
        <div class="detail-head">
          <div>
            <h1>${esc(node.label || node.id)}</h1>
            <div class="sub">${esc(node.localId || node.id)}</div>
          </div>
          <span class="badge ok">${esc(state.vocab?.id || "")}</span>
        </div>
        <div class="grid">
          ${visibleFields.map(([key, label]) => `
            <div class="key">${esc(fieldLabel(node, key, label))}</div>
            <div class="value">${esc(node[key] || "")}</div>
          `).join("")}
        </div>
        ${imagePaths.length ? `
          <div class="evidence-images">
            <h2>证据截图</h2>
            ${imagePaths.map((src, idx) => `
              <figure>
                <a href="${esc(src)}" target="_blank"><img src="${esc(src)}" alt="证据截图 ${idx + 1}" loading="lazy"></a>
                <figcaption>证据截图 ${idx + 1}</figcaption>
              </figure>
            `).join("")}
          </div>
        ` : ""}
      `;
    }

    function renderRelated(node) {
      if (!node) {
        relatedList.innerHTML = "";
        return;
      }
      const matches = state.related[node.id] || [];
      relatedList.innerHTML = `
        ${renderEntityCard(node, matches)}
        ${matches.length ? `
          <div class="related-section-title">确定相同项</div>
          ${matches.map(item => `
            <button class="related-item" type="button" data-vocab="${esc(item.vocabId)}" data-id="${esc(item.id)}">
              <span class="related-vocab">${esc(item.vocabCategory ? `${item.vocabCategory} · ${item.vocabName || item.vocabId}` : item.vocabName || item.vocabId)}</span>
              ${item.matchedTerms?.length ? `<span class="related-match">命中：${esc(item.matchedTerms.join("；"))}</span>` : ""}
              ${item.path ? `<span class="related-path">${esc(item.path)}</span>` : ""}
              ${item.definition ? `<span class="related-definition">${esc(item.definition)}</span>` : ""}
            </button>
          `).join("")}
        ` : `<div class="empty">暂无相关项</div>`}
      `;
      relatedList.querySelectorAll(".related-item").forEach(item => {
        item.addEventListener("click", () => openRelated(item.dataset.vocab, item.dataset.id));
      });
    }

    function renderEntityCard(node, matches) {
      const summary = buildEntitySummary(node, matches);
      const rows = [
        ["标准名称", summary.standardName],
        ["名称集合", summary.names],
        ["英文名", summary.englishNames],
        ["拼音名", summary.pinyinNames],
        ["相关节点", summary.relatedCount ? `${summary.relatedCount} 个确定性命中` : ""],
      ].filter(([, value]) => Array.isArray(value) ? value.length : String(value || "").trim());
      return `
        <section class="entity-card">
          <h3>标准实体摘要</h3>
          ${rows.map(([label, value]) => `
            <div class="entity-row">
              <div class="entity-key">${esc(label)}</div>
              ${Array.isArray(value)
                ? `<div class="entity-tags">${value.slice(0, 36).map(item => `<span class="entity-tag">${esc(item)}</span>`).join("")}</div>`
                : `<div class="entity-value">${esc(value)}</div>`}
            </div>
          `).join("")}
        </section>
      `;
    }

    function buildEntitySummary(node, matches) {
      const records = [node, ...matches];
      const rawNames = collectUnique(records, ["conceptName", "preferredName", "label", "aliases", "differentForms", "matchedTerms"]);
      const latinNames = rawNames.filter(looksLatinTerm);
      const names = rawNames.filter(value => !looksLatinTerm(value));
      return {
        standardName: node.conceptName || node.preferredName || node.label || node.id,
        names,
        englishNames: mergeUnique(collectUnique(records, ["englishNames"]), latinNames),
        pinyinNames: collectUnique(records, ["pinyinNames"]),
        relatedCount: matches.length,
      };
    }

    function collectUnique(records, keys) {
      const values = [];
      const seen = new Set();
      records.forEach(record => {
        keys.forEach(key => splitValues(record?.[key]).forEach(value => {
          const normalized = value.replace(/\s+/g, "").toLowerCase();
          if (!normalized || seen.has(normalized)) return;
          seen.add(normalized);
          values.push(value);
        }));
      });
      return values;
    }

    function mergeUnique(...groups) {
      const values = [];
      const seen = new Set();
      groups.flat().forEach(value => {
        const normalized = String(value || "").replace(/\s+/g, "").toLowerCase();
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        values.push(value);
      });
      return values;
    }

    function looksLatinTerm(value) {
      return /[A-Za-z]/.test(String(value || ""));
    }

    function splitValues(value) {
      if (Array.isArray(value)) return value.flatMap(item => splitValues(item));
      return String(value || "").split(/[;；｜|、,，\n]+/).map(item => item.trim()).filter(Boolean);
    }

    async function openRelated(vocabId, nodeId) {
      if (state.vocab?.id !== vocabId) {
        const index = state.index.findIndex(item => item.id === vocabId);
        if (index < 0) return;
        await loadVocab(index);
      }
      revealNode(nodeId);
    }

    function fieldLabel(node, key, fallback) {
      if (key === "definitions" && node.definitionsLabel) return node.definitionsLabel;
      return fallback;
    }

    function collapseAll() {
      state.expanded.clear();
      state.rendered.clear();
      state.selectedId = null;
      renderTree();
      expandRootLevel();
      detailEl.innerHTML = `<div class="empty">选择一个节点查看属性</div>`;
      renderRelated(null);
    }

    async function loadSearchIndex() {
      if (state.searchIndex) return state.searchIndex;
      state.searchIndex = await fetch(dataUrl("data/search_index.json"), { cache: "no-store" }).then(r => r.json());
      return state.searchIndex;
    }

    async function runSearch() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        searchResults.classList.remove("open");
        searchResults.innerHTML = "";
        return;
      }
      searchResults.innerHTML = `<div class="sub">检索中...</div>`;
      searchResults.classList.add("open");
      const records = await loadSearchIndex();
      const hits = records
        .filter(record => record.text.includes(query))
        .sort(searchResultSort)
        .slice(0, 120);
      searchResults.innerHTML = hits.length
        ? hits.map(record => `
            <div class="result-item" data-vocab="${esc(record.vocabId)}" data-id="${esc(record.id)}">
              <span class="result-label">${esc(record.label)}</span>
              <span class="sub result-vocab">${esc(resultMeta(record))}</span>
            </div>
          `).join("")
        : `<div class="sub">无匹配</div>`;
      searchResults.classList.add("open");
      searchResults.querySelectorAll(".result-item").forEach(item => {
        item.addEventListener("click", () => openSearchResult(item.dataset.vocab, item.dataset.id));
      });
    }

    function searchResultSort(a, b) {
      const aCurrent = a.vocabId === state.vocab?.id ? 0 : 1;
      const bCurrent = b.vocabId === state.vocab?.id ? 0 : 1;
      return aCurrent - bCurrent
        || (a.vocabCategoryOrder ?? 99) - (b.vocabCategoryOrder ?? 99)
        || (a.vocabOrder ?? 9999) - (b.vocabOrder ?? 9999)
        || String(a.vocabName).localeCompare(String(b.vocabName), "zh-Hans-CN")
        || String(a.path).localeCompare(String(b.path), "zh-Hans-CN")
        || String(a.label).localeCompare(String(b.label), "zh-Hans-CN");
    }

    function resultMeta(record) {
      return record.vocabId === state.vocab?.id ? `本词表 · ${record.vocabName || record.vocabId}` : record.vocabName || record.vocabId;
    }

    async function openSearchResult(vocabId, nodeId) {
      if (state.vocab?.id !== vocabId) {
        const index = state.index.findIndex(item => item.id === vocabId);
        if (index < 0) return;
        await loadVocab(index);
      }
      revealNode(nodeId);
    }

    function revealNode(id) {
      const node = state.data.nodes[id];
      if (!node) return;
      const lineage = [];
      let current = node;
      const guard = new Set();
      while (current && current.parent && current.parent !== "0" && !guard.has(current.parent)) {
        guard.add(current.parent);
        lineage.unshift(current.parent);
        current = state.data.nodes[current.parent];
      }
      lineage.forEach(parentId => {
        if (!state.rendered.has(parentId)) {
          const parent = state.data.nodes[parentId];
          if (parent && parent.parent && state.rendered.has(parent.parent)) {
            toggleNode(parent.parent, true);
          }
        }
        toggleNode(parentId, true);
      });
      selectNode(id);
      const wrap = state.rendered.get(id);
      if (wrap) wrap.scrollIntoView({ block: "center" });
    }

    function debounce(fn, delay) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    init().catch(error => {
      treeStatus.textContent = "加载失败";
      detailEl.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
      console.error(error);
    });
  </script>
</body>
</html>
